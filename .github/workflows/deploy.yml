name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/retro-paint-emulator-Xdamv
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable GitHub Pages (with "GitHub Actions" source)
          # on the first run so the deploy step doesn't fail when
          # Pages hasn't been turned on in repo Settings yet.
          enablement: true

      - name: Upload site as artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
